<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DragonMind Craft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    #game-canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #ui-layer {
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
    }
    #ui-layer.interactive { pointer-events: all; }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
