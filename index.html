<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DragonMind Craft</title>
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('/fonts/Minecraft.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      font-family: 'Minecraft', 'Courier New', monospace;
      user-select: none;
    }

    #game-canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Crosshair */
    #crosshair {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 20px;
      height: 20px;
      pointer-events: none;
      z-index: 20;
      display: none;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      opacity: 0.85;
    }
    #crosshair::before {
      width: 2px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
    }
    #crosshair::after {
      width: 100%;
      height: 2px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* Hotbar */
    #hotbar-container {
      position: fixed;
      bottom: 8px;
      width: 100%;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
      display: none;
    }
    #hotbar {
      background-color: rgba(80,80,80,0.85);
      border: 3px solid rgba(160,160,160,0.9);
      padding: 4px;
      display: flex;
      justify-content: space-between;
      column-gap: 4px;
      border-radius: 2px;
    }
    .hotbar-slot {
      width: 52px;
      height: 52px;
      background: rgba(30,30,30,0.7);
      border: 2px solid rgba(80,80,80,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-radius: 1px;
    }
    .hotbar-slot.selected {
      border: 2px solid white;
      background: rgba(50,50,50,0.9);
    }
    .hotbar-slot canvas {
      width: 40px;
      height: 40px;
      position: relative;
      image-rendering: pixelated;
    }
    .hotbar-slot .slot-count {
      position: absolute;
      bottom: 1px;
      right: 3px;
      font-size: 11px;
      color: white;
      text-shadow: 1px 1px 0 #000;
      font-family: 'Minecraft', monospace;
    }
    .hotbar-slot .slot-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 9px;
      color: white;
      white-space: nowrap;
      text-shadow: 1px 1px 0 #000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .hotbar-slot.selected .slot-label {
      opacity: 1;
    }

    /* HUD info */
    #hud-coords {
      position: fixed;
      top: 4px;
      left: 6px;
      color: white;
      font-size: 13px;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
      z-index: 20;
      display: none;
      line-height: 1.5;
    }

    /* Status messages */
    #status {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5em;
      color: white;
      text-shadow: 2px 2px 0 #000;
      pointer-events: none;
      z-index: 30;
    }

    /* Overlay / Main Menu */
    #overlay {
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(180deg, #0a0020 0%, #1a0040 40%, #2d0060 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    #menu-panel {
      text-align: center;
      color: white;
      max-width: 600px;
      width: 90%;
    }

    #menu-title {
      font-size: 3.5em;
      color: #cc44ff;
      text-shadow:
        0 0 20px #aa00ff,
        0 0 40px #8800cc,
        3px 3px 0 #440066;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    #menu-subtitle {
      font-size: 1em;
      color: #9966cc;
      margin-bottom: 40px;
      text-shadow: 1px 1px 0 #000;
    }

    .menu-btn {
      display: block;
      width: 280px;
      margin: 10px auto;
      padding: 14px 0;
      background: linear-gradient(180deg, #5a2080 0%, #3d1560 100%);
      border: 3px solid #8844cc;
      color: white;
      font-family: 'Minecraft', monospace;
      font-size: 1.1em;
      cursor: pointer;
      text-shadow: 1px 1px 0 #000;
      transition: background 0.15s, transform 0.1s;
    }
    .menu-btn:hover {
      background: linear-gradient(180deg, #7a30aa 0%, #5a2088 100%);
      transform: scale(1.03);
      border-color: #bb77ff;
    }
    .menu-btn:active {
      transform: scale(0.98);
    }

    #controls-info {
      margin-top: 30px;
      font-size: 0.75em;
      color: #886699;
      line-height: 1.8;
      text-shadow: 1px 1px 0 #000;
    }

    #controls-info span {
      color: #bb88ff;
    }

    /* Break progress bar */
    #break-progress-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 30px);
      width: 80px;
      height: 6px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.4);
      display: none;
      z-index: 25;
    }
    #break-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #cc44ff, #8800cc);
      width: 0%;
      transition: width 0.05s;
    }
  </style>
</head>
<body>
  <!-- 3D canvas rendered by Three.js -->
  <canvas id="game-canvas"></canvas>

  <!-- Crosshair -->
  <div id="crosshair"></div>

  <!-- Hotbar -->
  <div id="hotbar-container">
    <div id="hotbar"></div>
  </div>

  <!-- Coordinates HUD -->
  <div id="hud-coords"></div>

  <!-- Status -->
  <div id="status"></div>

  <!-- Break progress -->
  <div id="break-progress-container">
    <div id="break-progress-bar"></div>
  </div>

  <!-- Main Menu Overlay -->
  <div id="overlay">
    <div id="menu-panel">
      <div id="menu-title">&#x1F409; DragonMind Craft</div>
      <div id="menu-subtitle">by the Chu Collective &bull; v1.0</div>
      <button class="menu-btn" id="btn-play">&#x25BA; Play</button>
      <button class="menu-btn" id="btn-load">&#x1F4C2; Load Game</button>
      <div id="controls-info">
        <span>WASD</span> Move &nbsp;&bull;&nbsp; <span>Space</span> Jump &nbsp;&bull;&nbsp; <span>Shift</span> Sprint<br>
        <span>Left Click</span> Break &nbsp;&bull;&nbsp; <span>Right Click</span> Place &nbsp;&bull;&nbsp; <span>1-9</span> Hotbar<br>
        <span>F1</span> Save &nbsp;&bull;&nbsp; <span>F2</span> Load &nbsp;&bull;&nbsp; <span>F3</span> Debug &nbsp;&bull;&nbsp; <span>U</span> Settings<br>
        <span>Esc</span> Unlock mouse &nbsp;&bull;&nbsp; <span>R</span> Reset position
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
